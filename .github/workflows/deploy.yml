name: Build, Push and Deploy

on:
  push:
    branches:
      - feature
      - main

jobs:

# ================= CI =================
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------- BACKEND --------
      - name: Build Backend Image
        run: docker build -t sre-backend ./app/backend

      - name: Tag Backend Image
        run: docker tag sre-backend:latest ${{ secrets.ECR_BACKEND_URI }}:latest

      - name: Push Backend Image
        run: docker push ${{ secrets.ECR_BACKEND_URI }}:latest

      # -------- FRONTEND --------
      - name: Build Frontend Image
        run: docker build -t sre-frontend ./app/frontend

      - name: Tag Frontend Image
        run: docker tag sre-frontend:latest ${{ secrets.ECR_FRONTEND_URI }}:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.ECR_FRONTEND_URI }}:latest


# ================= CD =================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting services..."
            docker compose up -d
          
