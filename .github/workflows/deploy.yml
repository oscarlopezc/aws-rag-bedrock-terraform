name: AWS Serverless RAG Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-rag-deployment
  cancel-in-progress: false

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      TF_WORKING_DIR: terraform
      LAMBDA_DIR: app/lambda
      FRONTEND_DIR: app/frontend

    steps:

      ###############################################################
      # Checkout Repository
      ###############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ###############################################################
      # Configure AWS Credentials
      ###############################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      ###############################################################
      # Setup Terraform
      ###############################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ###############################################################
      # Setup Python
      ###############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      ###############################################################
      # Build Lambda Package
      ###############################################################

      - name: Build Lambda Package
        working-directory: ${{ env.LAMBDA_DIR }}
        run: |
          zip -r ../../terraform/lambda.zip .

      ###############################################################
      # Terraform Init
      ###############################################################

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      ###############################################################
      # Terraform Validate
      ###############################################################

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      ###############################################################
      # Terraform Plan
      ###############################################################

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false

      ###############################################################
      # Terraform Apply
      ###############################################################

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false

      ###############################################################
      # Read Terraform Outputs
      ###############################################################

      - name: Read Terraform Outputs
        id: terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "api_gateway=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT

      ###############################################################
      # Upload Frontend
      ###############################################################

      - name: Deploy Frontend to Amazon S3
        run: |
          aws s3 sync \
            ${{ env.FRONTEND_DIR }} \
            s3://${{ steps.terraform.outputs.frontend_bucket }} \
            --delete

      ###############################################################
      # CloudFront Cache Invalidation
      ###############################################################

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.terraform.outputs.cloudfront_distribution }} \
            --paths "/*"

      ###############################################################
      # Deployment Summary
      ###############################################################

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Bucket | ${{ steps.terraform.outputs.frontend_bucket }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront Distribution | ${{ steps.terraform.outputs.cloudfront_distribution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | ${{ steps.terraform.outputs.api_gateway }} |" >> $GITHUB_STEP_SUMMARY