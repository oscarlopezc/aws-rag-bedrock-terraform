name: CI-CD Pipeline (Build, Push, Deploy)

on:
  push:
    branches:
      - feature
      - main

jobs:
  # ================= CI =================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------- BACKEND --------
      - name: Build Backend Image
        run: docker build -t sre-backend ./app/backend

      - name: Tag Backend Image
        run: docker tag sre-backend:latest 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-backend:latest

      - name: Push Backend Image
        run: docker push 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-backend:latest

      # -------- FRONTEND --------
      - name: Build Frontend Image
        run: docker build -t sre-frontend ./app/frontend

      - name: Tag Frontend Image
        run: docker tag sre-frontend:latest 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-frontend:latest

      - name: Push Frontend Image
        run: docker push 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-frontend:latest

 # ================= CD DEV =================
  deploy-dev:
    if: github.ref == 'refs/heads/feature'
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy DEV to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin 211125724309.dkr.ecr.us-east-1.amazonaws.com

            echo "Pulling latest images..."
            docker pull 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-backend:latest
            docker pull 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-frontend:latest

            echo "Deploying DEV..."
            cd /home/ubuntu/app
            docker compose down
            docker compose up -d


# ================= CD PROD =================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy PROD to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin 211125724309.dkr.ecr.us-east-1.amazonaws.com

            echo "Pulling latest images..."
            docker pull 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-backend:latest
            docker pull 211125724309.dkr.ecr.us-east-1.amazonaws.com/sre-frontend:latest

            echo "Deploying PROD..."
            cd /home/ubuntu/app
            docker compose down
            docker compose up -d